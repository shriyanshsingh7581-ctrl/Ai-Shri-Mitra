<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Mitra - AI Studio & Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #d946ef;
            --bg-dark: #09090b; --card-bg: rgba(15, 23, 42, 0.4);
            --text-main: #f8fafc; --text-dim: #a1a1aa; --glass-border: rgba(255, 255, 255, 0.08);
        }

        body.rcb-theme {
            --primary: #EC1C24; --primary-dark: #B21016; --secondary: #D4AF37; 
            --bg-dark: #000000; --card-bg: rgba(20, 5, 5, 0.6); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-x: hidden; position: relative; }

        .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; animation: float 10s infinite alternate ease-in-out; }
        .orb-1 { width: 400px; height: 400px; background: rgba(99, 102, 241, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: rgba(217, 70, 239, 0.1); bottom: -10%; right: -10%; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        /* Login Screen */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .login-box { background: var(--card-bg); border: 1px solid var(--glass-border); padding: 50px; border-radius: 28px; backdrop-filter: blur(20px); max-width: 400px; width: 90%; }
        .login-box h1 { font-size: 2.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .google-btn { background: white; color: #333; border: none; padding: 12px 24px; border-radius: 50px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; margin: 20px auto 0; transition: 0.3s; }
        .google-btn img { width: 24px; }
        .google-btn:hover { box-shadow: 0 5px 15px rgba(255,255,255,0.2); transform: translateY(-2px); }

        /* App Layout */
        .app-container { position: relative; background: var(--card-bg); backdrop-filter: blur(20px); max-width: 900px; width: 100%; border-radius: 28px; padding: 40px; border: 1px solid var(--glass-border); z-index: 10; display: none; }
        
        .user-profile { position: absolute; top: 25px; left: 25px; display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-dim); }
        .user-profile img { width: 35px; border-radius: 50%; border: 2px solid var(--primary); }
        .logout-btn { background: transparent; border: 1px solid var(--glass-border); color: #ef4444; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 12px; margin-left: 10px; transition: 0.3s; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.1); }
        
        .theme-toggle-btn { position: absolute; top: 25px; right: 25px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.3s;}
        
        .header { text-align: center; margin-bottom: 35px; margin-top: 20px; }
        .header h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #818cf8, #d946ef, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }

        /* TABS */
        .tabs { display: flex; flex-wrap: wrap; background: rgba(0, 0, 0, 0.3); padding: 8px; border-radius: 20px; margin-bottom: 35px; border: 1px solid var(--glass-border); gap: 5px; }
        .tab-btn { flex: 1; min-width: 120px; padding: 14px; background: transparent; color: var(--text-dim); border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;}
        .tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Inputs & Buttons */
        .input-group, .chat-controls { display: flex; gap: 12px; margin-bottom: 25px; align-items: stretch; }
        input[type="text"] { flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--glass-border); padding: 18px 20px; border-radius: 16px; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,255,255,0.05); }
        .mic-btn { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--glass-border); color: var(--text-dim); border-radius: 16px; padding: 0 22px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .mic-btn.listening { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .btn-premium { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 0 32px; border-radius: 16px; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-premium:disabled { background: #3f3f46; color: #a1a1aa; cursor: not-allowed; }

        /* Image Area */
        .image-display-area { position: relative; background: rgba(0, 0, 0, 0.4); border-radius: 24px; min-height: 400px; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 1px dashed rgba(255,255,255,0.2); margin-bottom: 20px; }
        #aiImage { width: 100%; height: auto; max-height: 600px; object-fit: contain; display: none; }
        .shimmer { width: 100%; height: 400px; background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; display: none; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        
        /* Auto-Save Status Area */
        .action-buttons { display: flex; align-items: center; justify-content: center; gap: 15px; display: none; }
        .action-btn { background: #10b981; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .action-btn:hover { transform: translateY(-2px); }
        .auto-save-status { color: var(--text-dim); font-size: 14px; display: flex; align-items: center; gap: 8px; font-weight: 500;}

        /* Gallery Styles */
        .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .gallery-container::-webkit-scrollbar { width: 6px; }
        .gallery-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .gallery-item { position: relative; border-radius: 16px; overflow: hidden; border: 1px solid var(--glass-border); aspect-ratio: 1; background: rgba(0,0,0,0.5); cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px 10px 10px; color: white; font-size: 13px; opacity: 0; transition: opacity 0.3s ease; display: flex; flex-direction: column; gap: 8px; }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        .gallery-overlay a { color: var(--secondary); text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }

        /* Chat Window */
        .persona-container { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .persona-dropdown { background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid var(--glass-border); padding: 10px; border-radius: 12px; outline: none; }
        .chat-window { background: rgba(0, 0, 0, 0.3); border-radius: 24px; height: 420px; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; border: 1px solid var(--glass-border); margin-bottom: 20px; scroll-behavior: smooth; }
        .chat-window::-webkit-scrollbar { width: 6px; }
        .chat-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .msg { max-width: 82%; padding: 14px 20px; border-radius: 20px; font-size: 15px; line-height: 1.6; word-wrap: break-word; position: relative; }
        .msg.user { align-self: flex-end; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255,255,255,0.05); color: #f1f5f9; border-bottom-left-radius: 4px; padding-right: 50px; }
        .speak-btn { position: absolute; right: 12px; top: 12px; background: transparent; border: none; color: var(--secondary); cursor: pointer; font-size: 18px; }
        .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 5px 0; }
        .dot { width: 8px; height: 8px; background: #a1a1aa; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(1) { animation-delay: 0s; } .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }

        /* Responsive */
        @media (max-width: 600px) {
            .app-container { padding: 25px 20px; margin-top: 50px; }
            .tabs { flex-direction: column; }
            .input-group, .chat-controls { flex-wrap: wrap; }
            input[type="text"] { width: 100%; margin-bottom: 10px; flex: none; }
            .mic-btn { flex: 1; padding: 16px 0; }
            .btn-premium { flex: 2; padding: 16px; justify-content: center; }
            .theme-toggle-btn { top: -40px; right: 0; padding: 6px 12px; font-size: 11px; }
            .user-profile { top: -40px; left: 0; }
            .gallery-container { grid-template-columns: repeat(2, 1fr); }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div><div class="bg-orb orb-2"></div>

    <div id="loginOverlay">
        <div class="login-box">
            <h1>Shri Mitra AI</h1>
            <p>Welcome! Please login to save your creations and chats securely in the cloud.</p>
            <button class="google-btn" onclick="signInWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Sign in with Google
            </button>
        </div>
    </div>

    <div class="app-container" id="mainApp">
        <div class="user-profile">
            <img id="userPic" src="" alt="User">
            <div><span id="userName">User</span><button class="logout-btn" onclick="logout()">Logout</button></div>
        </div>

        <button class="theme-toggle-btn" id="themeBtn" onclick="toggleTheme()">🏏 RCB Theme</button>

        <div class="header">
            <h1>Shri Mitra</h1><p>Cloud Connected AI Assistant</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('imageTab', this)"><i class="fa-solid fa-wand-magic-sparkles"></i> Image Studio</button>
            <button class="tab-btn" onclick="switchTab('galleryTab', this)"><i class="fa-solid fa-images"></i> My Gallery</button>
            <button class="tab-btn" onclick="switchTab('chatTab', this)"><i class="fa-solid fa-comment-dots"></i> AI Chat</button>
        </div>

        <div id="imageTab" class="section active">
            <div class="input-group">
                <input type="text" id="promptInput" placeholder="Describe your imagination..." onkeypress="if(event.key === 'Enter') generateImage()">
                <button class="mic-btn" onclick="startVoiceTyping('promptInput', this)"><i class="fa-solid fa-microphone"></i></button>
                <button id="genBtn" class="btn-premium" onclick="generateImage()">Generate</button>
            </div>
            <div class="image-display-area" id="imageDisplay">
                <div class="shimmer" id="shimmer"></div>
                <div id="placeholderText" style="color: rgba(255,255,255,0.3); text-align: center;"><i class="fa-regular fa-image" style="font-size: 3rem; margin-bottom: 10px;"></i><br>Your masterpiece will appear here</div>
                <img id="aiImage" crossorigin="anonymous" alt="Artwork">
            </div>
            
            <div class="action-buttons" id="actionBtns">
                <button class="action-btn" onclick="downloadImage()"><i class="fa-solid fa-download"></i> Save to Device</button>
                <span id="autoSaveStatus" class="auto-save-status"></span>
            </div>
        </div>

        <div id="galleryTab" class="section">
            <h3 style="text-align:center; margin-bottom: 20px; color: var(--text-main);">Saved Cloud Creations</h3>
            <div class="gallery-container" id="galleryGrid">
                </div>
        </div>

        <div id="chatTab" class="section">
            <div class="persona-container">
                <select id="personaSelect" class="persona-dropdown">
                    <option value="default">🤖 Normal</option>
                    <option value="shayar">✍️ Shayar</option>
                    <option value="comedian">😂 Comedian</option>
                    <option value="coder">💻 Coder</option>
                </select>
            </div>
            <div class="chat-window" id="chatBox"></div>
            <div class="chat-controls">
                <input type="text" id="chatInput" placeholder="Ask anything..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="mic-btn" onclick="startVoiceTyping('chatInput', this)"><i class="fa-solid fa-microphone"></i></button>
                <button class="btn-premium" id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyD1ALXTuFnD9CuZWJmqW8VN3IFwl5KKuDM",
            authDomain: "login-416ce.firebaseapp.com",
            databaseURL: "https://login-416ce-default-rtdb.firebaseio.com",
            projectId: "login-416ce",
            storageBucket: "login-416ce.firebasestorage.app",
            messagingSenderId: "668988371049",
            appId: "1:668988371049:web:8e62a795b8392cb52fb2f8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxeuzdwkz/image/upload";
        const UPLOAD_PRESET = "shri_mitra_preset"; 
        const pollApiKey = "sk_cbty293zoEEDKLJXsMAaq4A2psY1yq1a";
        let currentUser = null;

        // --- AUTH LOGIC ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPic').src = user.photoURL;
                loadChatHistory();
                loadGallery();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert("Login Error: " + e.message));
        }
        function logout() { auth.signOut(); document.getElementById("chatBox").innerHTML = ""; document.getElementById("galleryGrid").innerHTML = ""; }

        // --- UI UTILS ---
        function switchTab(t, el) { 
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(t).classList.add('active'); 
            el.classList.add('active'); 
        }
        function toggleTheme() { 
            document.body.classList.toggle("rcb-theme"); 
            document.getElementById("themeBtn").innerHTML = document.body.classList.contains("rcb-theme") ? "🌌 Default Theme" : "🏏 RCB Theme"; 
        }

        function startVoiceTyping(inputId, btn) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("Browser not supported!");
            const rec = new SpeechRecognition();
            rec.lang = 'hi-IN';
            rec.onstart = () => btn.classList.add("listening");
            rec.onresult = (e) => { document.getElementById(inputId).value += " " + e.results[0][0].transcript; }
            rec.onend = () => btn.classList.remove("listening");
            rec.start();
        }

        // --- IMAGE LOGIC (AUTO-UPLOAD ADDED) ---
        let currentGeneratedBlob = null; let currentPrompt = "";
        
        async function generateImage() {
            currentPrompt = document.getElementById("promptInput").value;
            if (!currentPrompt) return;
            
            let btn = document.getElementById("genBtn"); 
            let img = document.getElementById("aiImage");
            let statusText = document.getElementById("autoSaveStatus");
            
            btn.innerHTML = `Wait...`; btn.disabled = true;
            document.getElementById("actionBtns").style.display = "none"; 
            document.getElementById("placeholderText").style.display = "none"; 
            document.getElementById("shimmer").style.display = "block"; 
            img.style.display = "none";
            statusText.innerHTML = ""; // reset status

            const url = `https://gen.pollinations.ai/image/${encodeURIComponent(currentPrompt)}?key=${pollApiKey}&model=flux&nologo=true`;
            
            try {
                const response = await fetch(url);
                currentGeneratedBlob = await response.blob();
                img.src = URL.createObjectURL(currentGeneratedBlob);
                img.onload = () => { 
                    document.getElementById("shimmer").style.display = "none"; 
                    img.style.display = "block"; 
                    document.getElementById("actionBtns").style.display = "flex"; 
                    btn.innerHTML = `Generate`; btn.disabled = false; 
                    
                    // NAYA: Photo load hote hi Automatically Cloud par bhej do!
                    autoUploadToCloudinary();
                };
            } catch (e) { alert("Failed to generate image!"); btn.innerHTML = `Generate`; btn.disabled = false; }
        }

        async function autoUploadToCloudinary() {
            if(!currentGeneratedBlob || !currentUser) return;
            
            let statusText = document.getElementById("autoSaveStatus");
            statusText.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Auto-saving...`;
            
            const formData = new FormData(); 
            formData.append('file', currentGeneratedBlob); 
            formData.append('upload_preset', UPLOAD_PRESET);
            
            try {
                const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData }); 
                const data = await res.json();
                
                if(data.secure_url) {
                    // Push URL to Firebase DB
                    await db.ref(`users/${currentUser.uid}/gallery`).push({ 
                        url: data.secure_url, 
                        prompt: currentPrompt, 
                        timestamp: firebase.database.ServerValue.TIMESTAMP 
                    });
                    
                    statusText.innerHTML = `<i class="fa-solid fa-check" style="color: #10b981;"></i> Saved to Gallery!`;
                    // 4 second baad success text hata do cleanliness ke liye
                    setTimeout(() => statusText.innerHTML = "", 4000);
                } else throw new Error("Cloud error");
            } catch(e) { 
                console.error(e);
                statusText.innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="color: #ef4444;"></i> Save failed`; 
            }
        }

        function downloadImage() {
            if(!currentGeneratedBlob) return;
            const link = document.createElement("a"); link.href = URL.createObjectURL(currentGeneratedBlob); link.download = `ShriMitra_${Date.now()}.jpg`; link.click();
        }

        // --- GALLERY SYNC LOGIC ---
        function loadGallery() {
            const galleryGrid = document.getElementById('galleryGrid');
            db.ref(`users/${currentUser.uid}/gallery`).on('value', snapshot => {
                galleryGrid.innerHTML = ''; 
                if (snapshot.exists()) {
                    let items = [];
                    snapshot.forEach(child => { items.push(child.val()); });
                    items.reverse().forEach(data => {
                        let div = document.createElement('div');
                        div.className = 'gallery-item';
                        let shortPrompt = data.prompt.length > 50 ? data.prompt.substring(0, 50) + "..." : data.prompt;
                        
                        div.innerHTML = `
                            <img src="${data.url}" alt="${shortPrompt}" loading="lazy">
                            <div class="gallery-overlay">
                                <span>${shortPrompt}</span>
                                <a href="${data.url}" target="_blank"><i class="fa-solid fa-expand"></i> View</a>
                            </div>
                        `;
                        galleryGrid.appendChild(div);
                    });
                } else {
                    galleryGrid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:var(--text-dim); margin-top:20px;">No photos saved yet. Generate an image to see it here!</p>`;
                }
            });
        }

        // --- CHAT LOGIC ---
        async function loadChatHistory() {
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = ""; 
            try {
                const snapshot = await db.ref(`users/${currentUser.uid}/chats`).once('value');
                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        const msgData = child.val();
                        let div = document.createElement("div"); div.className = `msg ${msgData.role}`;
                        if(msgData.role === 'ai') {
                            div.innerHTML = `<strong>Shri Mitra:</strong><br><br><span class="text-content">${msgData.text}</span><button class="speak-btn" onclick="speakText(this.previousElementSibling.innerText)">🔊</button>`;
                        } else {
                            div.innerText = msgData.text;
                        }
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    chatBox.innerHTML = `<div class="msg ai"><strong>Shri Mitra:</strong><br><br><span class="text-content">Namaste! 🙏 Main aapka smart AI dost hoon. Aaj main aapki kaise madad kar sakta hoon?</span></div>`;
                }
            } catch(e) { console.log("History Error", e); }
        }

        async function sendMessage() {
            let input = document.getElementById("chatInput"); let sendBtn = document.getElementById("sendBtn"); let text = input.value.trim();
            if (!text || !currentUser) return;

            input.value = ""; sendBtn.disabled = true;
            let chatBox = document.getElementById("chatBox");
            
            let userDiv = document.createElement("div"); userDiv.className = "msg user"; userDiv.innerText = text; chatBox.appendChild(userDiv); chatBox.scrollTop = chatBox.scrollHeight;
            db.ref(`users/${currentUser.uid}/chats`).push({ role: 'user', text: text, timestamp: firebase.database.ServerValue.TIMESTAMP }).catch(e => console.log(e));

            let typingDiv = document.createElement("div"); typingDiv.className = "msg ai"; typingDiv.innerHTML = `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`; chatBox.appendChild(typingDiv); chatBox.scrollTop = chatBox.scrollHeight;

            try {
                let persona = document.getElementById("personaSelect").value;
                let sysPrompt = "You are Shri Mitra. Talk in Hinglish.";
                if(persona === 'shayar') sysPrompt += " Answer in beautiful Shayari.";
                if(persona === 'comedian') sysPrompt += " Answer very funny and sarcastic.";
                if(persona === 'coder') sysPrompt += " Answer technically as a developer.";
                if(document.body.classList.contains("rcb-theme")) sysPrompt += " You are an RCB fan.";

                const response = await fetch(`https://gen.pollinations.ai/text/${encodeURIComponent(text)}?system=${encodeURIComponent(sysPrompt)}&key=${pollApiKey}`);
                let aiResponse = await response.text();
                let cleanedData = aiResponse.replace(/\n/g, '<br>');

                chatBox.removeChild(typingDiv);
                let aiDiv = document.createElement("div"); aiDiv.className = "msg ai"; aiDiv.innerHTML = `<strong>Shri Mitra:</strong><br><br><span class="text-content">${cleanedData}</span><button class="speak-btn" onclick="speakText(this.previousElementSibling.innerText)">🔊</button>`; chatBox.appendChild(aiDiv); chatBox.scrollTop = chatBox.scrollHeight;
                speakText(aiResponse);

                db.ref(`users/${currentUser.uid}/chats`).push({ role: 'ai', text: cleanedData, timestamp: firebase.database.ServerValue.TIMESTAMP }).catch(e => console.log(e));
            } catch (err) {
                chatBox.removeChild(typingDiv); let errDiv = document.createElement("div"); errDiv.className = "msg ai"; errDiv.innerHTML = `<span style="color: #f43f5e;">Network Error! Check connection.</span>`; chatBox.appendChild(errDiv);
            }
            sendBtn.disabled = false;
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            let utterance = new SpeechSynthesisUtterance(text.replace(/<br>/g, ' '));
            utterance.lang = 'hi-IN';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>

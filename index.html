<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shri Mitra AI - Creative Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        /* --- VIBRANT GLASSMORPHISM VARIABLES --- */
        :root {
            --bg-deep: #0b0c10;
            --card-bg: rgba(30, 32, 44, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            
            --primary: #8b5cf6; 
            --secondary: #ec4899; 
            --gradient: linear-gradient(135deg, #8b5cf6, #ec4899);
            --gold-gradient: linear-gradient(135deg, #f59e0b, #fbbf24);
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* --- RCB THEME --- */
        body.rcb-theme {
            --bg-deep: #0a0000;
            --card-bg: rgba(40, 10, 10, 0.6);
            --primary: #EC1C24;
            --secondary: #D4AF37;
            --gradient: linear-gradient(135deg, #EC1C24, #D4AF37);
        }

        /* --- GLOBAL RESET --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            outline: none; 
        }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            min-height: 100vh; 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            opacity: 0; 
            animation: appFadeIn 1s ease forwards; 
        }
        
        @keyframes appFadeIn { 
            to { opacity: 1; } 
        }

        /* --- STUNNING BACKGROUND ORBS --- */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            opacity: 0.4;
            animation: float 15s infinite alternate ease-in-out;
        }
        
        .orb-1 {
            top: -10%; left: -10%;
            width: 350px; height: 350px;
            background: var(--primary);
        }
        
        .orb-2 {
            bottom: -10%; right: -10%;
            width: 400px; height: 400px;
            background: var(--secondary);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.2); }
        }

        button { 
            cursor: pointer; 
            transition: var(--transition); 
            background: none; 
            border: none; 
        }
        
        button:active { 
            transform: scale(0.95); 
        }

        /* --- SPLASH SCREEN --- */
        #splashScreen { 
            position: fixed; 
            inset: 0; 
            background-color: var(--bg-deep); 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: opacity 0.5s ease, visibility 0.5s; 
        }

        #splashScreen.hidden { 
            opacity: 0; 
            visibility: hidden; 
        }
        
        .splash-logo { 
            font-size: 3rem; 
            font-weight: 800; 
            letter-spacing: -1px; 
            background: var(--gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 
            0%, 100% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.05); opacity: 0.8; } 
        }

        .loader-bar {
            width: 150px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loader-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: var(--gradient);
            width: 50%;
            animation: loadingBar 1.5s infinite ease-in-out;
            border-radius: 10px;
        }

        @keyframes loadingBar {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        /* --- LOGIN SCREEN --- */
        #loginOverlay { 
            position: fixed; 
            inset: 0; 
            background: var(--bg-deep); 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            transition: opacity 0.5s ease, visibility 0.5s; 
            opacity: 0; 
            visibility: hidden;
        }

        #loginOverlay.active { 
            opacity: 1; 
            visibility: visible; 
        }
        
        .login-box { 
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            padding: 40px; 
            border-radius: 30px; 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            max-width: 380px; 
            width: 100%; 
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .google-btn-premium { 
            background: #ffffff; 
            color: #0f172a; 
            padding: 16px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 700; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(255,255,255,0.1);
        }

        .google-btn-premium:hover {
            box-shadow: 0 15px 35px rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        /* --- APP HEADER --- */
        .app-header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            padding: calc(15px + var(--safe-top)) 20px 15px; 
            background: rgba(11, 12, 16, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border); 
            z-index: 1000; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .brand-logo h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: var(--gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        /* --- AI MODE TOGGLE BUTTON --- */
        .ai-mode-btn {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid var(--primary);
            padding: 6px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 12px;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
        }

        .coin-badge {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 13px;
            color: #fbbf24;
            cursor: pointer;
        }

        .coin-badge i {
            animation: flipCoin 3s infinite linear;
        }

        @keyframes flipCoin {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }
        
        .user-profile-thumb img { 
            width: 36px; 
            height: 36px; 
            border-radius: 12px; 
            object-fit: cover; 
            border: 2px solid transparent;
            background: var(--gradient);
            padding: 2px;
        }
        
        .theme-toggle-btn { 
            color: var(--text-main); 
            font-size: 1.1rem; 
            padding: 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
        }

        .theme-toggle-btn.listening {
            color: #10b981;
            border-color: #10b981;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* --- MAIN CONTENT & NAVIGATION --- */
        .app-main { 
            flex: 1; 
            margin-top: calc(80px + var(--safe-top)); 
            margin-bottom: calc(100px + var(--safe-bottom)); 
            padding: 0 20px; 
            max-width: 600px; 
            width: 100%; 
            margin-left: auto; 
            margin-right: auto; 
        }
        
        .section { 
            display: none; 
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .section.active { 
            display: block; 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* FLOATING GLASS BOTTOM NAV */
        .bottom-nav { 
            position: fixed; 
            bottom: calc(20px + var(--safe-bottom)); 
            left: 50%; 
            transform: translateX(-50%);
            width: calc(100% - 20px); 
            max-width: 500px;
            height: 70px; 
            background: rgba(20, 22, 30, 0.8); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border); 
            border-radius: 24px;
            z-index: 1000; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 10px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow-x: auto;
        }

        .bottom-nav::-webkit-scrollbar { 
            display: none; 
        }
        
        .nav-item { 
            flex: 0 0 auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 54px; 
            border-radius: 16px; 
            color: var(--text-muted); 
            gap: 5px;
            position: relative;
            width: 16%;
            min-width: 50px;
        }
        
        .nav-item i { 
            font-size: 1.2rem; 
            transition: var(--transition); 
        }

        .nav-item span { 
            font-size: 9px; 
            font-weight: 700; 
        }
        
        .nav-item.active { 
            color: var(--text-main); 
        }

        .nav-item.active i {
            color: var(--secondary);
            transform: translateY(-2px);
        }

        /* --- GLASSMORPHISM CARDS --- */
        .glass-card { 
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            border-radius: 24px; 
            padding: 24px; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        textarea.studio-input { 
            width: 100%; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid var(--card-border); 
            color: white; 
            font-size: 15px; 
            line-height: 1.5; 
            resize: none; 
            padding: 16px; 
            border-radius: 16px;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        textarea.studio-input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
        
        .image-tools { 
            display: flex; 
            gap: 12px; 
        }
        
        .btn-gradient { 
            flex: 1; 
            background: var(--gradient); 
            color: white; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: 700; 
            font-size: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-gradient:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        
        .btn-mic-icon { 
            background: rgba(0,0,0,0.3); 
            color: var(--text-main); 
            border: 1px solid var(--card-border);
            width: 54px; 
            height: 54px; 
            border-radius: 16px; 
            font-size: 1.2rem;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .btn-mic-icon.listening { 
            color: #ef4444; 
            border-color: #ef4444;
            animation: pulse 1.5s infinite; 
        }

        .image-view-card { 
            width: 100%; 
            aspect-ratio: 1; 
            border-radius: 24px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--card-border); 
            margin-bottom: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            position: relative;
        }
        
        .media-preview { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: none; 
            z-index: 2;
            border-radius: 24px;
        }
        
        .shimmer { 
            position: absolute; 
            inset: 0; 
            display: none;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); 
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite linear; 
        }

        @keyframes shimmer { 
            0% { background-position: -200% 0; } 
            100% { background-position: 200% 0; } 
        }

        .post-gen-actions { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            display: none; 
            margin-top: 16px;
        }

        .action-row { 
            display: flex; 
            gap: 10px; 
            width: 100%; 
        }
        
        .action-btn-glass { 
            background: var(--card-bg); 
            color: var(--text-main); 
            padding: 14px; 
            border-radius: 16px; 
            font-weight: 600; 
            font-size: 14px; 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            border: 1px solid var(--card-border);
        }

        .action-btn-glass:hover {
            background: rgba(255,255,255,0.1);
        }

        /* --- GALLERY & EXPLORE --- */
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
            padding-bottom: 20px;
        }
        
        .gallery-item { 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--card-border); 
            aspect-ratio: 1; 
            background: rgba(0,0,0,0.5); 
            position: relative;
        }

        .gallery-item img, .gallery-item video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .explore-overlay { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            padding: 16px 12px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); 
        }

        .explore-author { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 8px;
        }

        .explore-author img { 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            border: 1px solid var(--primary);
        }

        .explore-author span { 
            font-size: 12px; 
            font-weight: 600; 
            color: white; 
        }
        
        .explore-actions { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 8px; 
        }

        .explore-icon-btn { 
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            padding: 6px 10px;
            border-radius: 8px;
            color: white; 
            font-size: 11px; 
            font-weight: 600;
            display: flex; 
            align-items: center; 
            gap: 6px;
        }

        /* --- CHAT SECTION --- */
        .chat-container { 
            display: flex; 
            flex-direction: column; 
            height: calc(100vh - 180px - var(--safe-top) - var(--safe-bottom)); 
            padding: 16px; 
        }
        
        .chat-window { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            padding-right: 4px;
        }

        .chat-window::-webkit-scrollbar { 
            display: none; 
        }
        
        .msg { 
            max-width: 85%; 
            padding: 14px 18px; 
            font-size: 15px; 
            line-height: 1.5; 
            border-radius: 20px; 
            animation: fadeIn 0.3s ease; 
        }

        .msg.user { 
            align-self: flex-end; 
            background: var(--gradient); 
            color: white; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.2);
        }

        .msg.ai { 
            align-self: flex-start; 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); 
            color: var(--text-main); 
            border-bottom-left-radius: 4px; 
        }
        
        .chat-controls { 
            display: flex; 
            gap: 10px; 
            margin-top: 16px; 
            align-items: center;
        }
        
        #chatInput { 
            flex: 1; 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); 
            padding: 16px 20px; 
            color: white; 
            font-size: 15px; 
            border-radius: 100px; 
        }
        
        .btn-send { 
            background: var(--gradient); 
            color: white; 
            width: 52px; 
            height: 52px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
        }

        /* --- DIALOGS --- */
        .modal-overlay {
            display:none; 
            position:fixed; 
            inset: 0;
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(10px);
            z-index: 3000; 
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .recharge-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            animation: slideUp 0.3s ease;
        }

        .recharge-box h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .recharge-box p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-pay {
            background: var(--gold-gradient);
            color: #000;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-muted);
            width: 100%;
            padding: 12px;
            font-weight: 600;
        }

        #logoutDialog { 
            display:none; 
            position:fixed; 
            top:calc(75px + var(--safe-top)); 
            right:24px; 
            background: rgba(30, 32, 44, 0.9); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border); 
            border-radius: 20px; 
            padding: 12px; 
            z-index: 1001; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            min-width: 200px;
        }

        .dialog-btn { 
            width: 100%; 
            text-align: left; 
            padding: 14px 16px; 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-radius: 12px;
        }

        .dialog-btn:hover { background: rgba(255,255,255,0.1); }
        .dialog-btn.red { color: #ef4444; }

        .typing-indicator { display: flex; gap: 5px; padding: 8px 4px; }
        .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce { 
            0%, 80%, 100% { transform: scale(0); opacity: 0.3;} 
            40% { transform: scale(1); opacity: 1;} 
        }
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div id="splashScreen">
        <span class="splash-logo">Shri Mitra</span>
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <div id="loginOverlay">
        <div class="login-box">
            <h1 style="font-size:2.5rem; font-weight:800; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:12px;">Shri Mitra</h1>
            <p style="color:var(--text-muted); font-size:15px;">Your Creative Intelligence.</p>
            <button class="google-btn-premium" onclick="signInWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style="width:24px;" alt="G"> Continue with Google
            </button>
        </div>
    </div>

    <div class="app-container" id="mainApp" style="display:none;">
        
        <header class="app-header">
            <div class="brand-logo"><h1>Shri Mitra</h1></div>
            <div class="header-actions">
                
                <div id="aiModeToggle" class="ai-mode-btn" onclick="toggleAIModel()">
                    <i class="fa-solid fa-bolt" id="modeIcon" style="color: #3b82f6;"></i> 
                    <span id="modeText">Fast Mode</span>
                </div>

                <div id="coinDisplay" class="coin-badge" onclick="openRechargeModal()">
                    <i class="fa-solid fa-coins"></i> <span id="coinCount">...</span>
                </div>

                <div class="user-profile-thumb" onclick="toggleLogoutDialog()">
                    <img id="userPic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile">
                </div>
            </div>
        </header>

        <main class="app-main">
            
            <div id="imageTab" class="section active">
                <div class="glass-card">
                    <textarea id="promptInput" class="studio-input" rows="2" placeholder="What image will you create today?"></textarea>
                    
                    <input type="file" id="imageUpload" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">

            window.speechSynthesis.speak(utterance);

        async function generateImage() {
            let cost = isProMode ? 2 : 0;
            if (userCoinBalance < cost) return openRechargeModal();
            
            currentPrompt = document.getElementById("promptInput").value.trim();
            if (!currentPrompt) return;
            
            let btn = document.getElementById("genBtn"); 
            let img = document.getElementById("aiImage"); 
            let shimmer = document.getElementById("shimmer");
            let actionBtns = document.getElementById("actionBtns");
            let placeholder = document.getElementById("placeholderText");
            
            actionBtns.style.display = "none"; placeholder.style.display = "none"; 
            shimmer.style.display = "block"; img.style.display = "none"; btn.disabled = true;

            if(uploadedImageFile || isProMode) {
                btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Processing Pro...`;
                try {
                    let inputPayload = { prompt: currentPrompt };
                    let targetVersion = "39ed52f2a78e934b3ba6e2a89f5b1c712de7dfea535525255b1aa35c5565e08b"; 
                    
                    if(uploadedImageFile) {
                        const fd = new FormData(); fd.append('file', uploadedImageFile); fd.append('upload_preset', UPLOAD_PRESET);
                        const cloudRes = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                        const cloudData = await cloudRes.json();
                        inputPayload.image = cloudData.secure_url;
                        inputPayload.prompt_strength = 0.7;
                    }

                    const createRes = await fetchFromMyBackend("https://api.replicate.com/v1/predictions", "POST", { 
                        version: targetVersion,
                        input: inputPayload
                    });
                    
                    const createData = await createRes.json();
                    if (!createRes.ok || createData.error) throw new Error(createData.error);
                    const getUrl = createData.urls.get;

                    const checkStatus = async () => {
                        try {
                            const pollRes = await fetchFromMyBackend(getUrl, "GET"); const pollData = await pollRes.json();
                            if (pollData.status === "succeeded") {
                                db.ref(`users/${currentUser.uid}/coins`).set(userCoinBalance - cost);
                                let imgFetchRes = await fetch(Array.isArray(pollData.output) ? pollData.output[0] : pollData.output);

                                img.style.display = "block"; shimmer.style.display = "none";
                                btn.innerHTML = isProMode ? `Generate Pro (2 <i class="fa-solid fa-coins" style="font-size: 12px;"></i>)` : `Generate Fast (Free)`; 
                                btn.disabled = false; actionBtns.style.display = "flex";
                                autoUploadMediaToCloudinary(currentGeneratedBlob, 'image', 'autoSaveStatus', 'image.jpg');
                            } else if (pollData.status === "failed") throw new Error("Failed");
                            else setTimeout(checkStatus, 3000);
                        } catch(err) { alert(err.message); btn.innerHTML = isProMode ? `Generate Pro` : `Generate Fast`; btn.disabled = false; shimmer.style.display = "none"; placeholder.style.display = "block"; }
                    };
                    setTimeout(checkStatus, 3000);
                } catch(e) { alert(e.message); btn.innerHTML = isProMode ? `Generate Pro` : `Generate Fast`; btn.disabled = false; shimmer.style.display = "none"; placeholder.style.display = "block"; }
            
            } else {
                btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Fast Gen...`; 
                try {
                    const res = await fetch(`https://gen.pollinations.ai/image/${encodeURIComponent(currentPrompt)}?key=${pollApiKey}&model=flux&nologo=true`);
                    currentGeneratedBlob = await res.blob();
                    img.src = URL.createObjectURL(currentGeneratedBlob);
                    img.onload = () => { 
                        btn.innerHTML = `Generate Fast (Free)`; btn.disabled = false; 
                        shimmer.style.display = "none"; img.style.display = "block"; actionBtns.style.display = "flex"; 
                        autoUploadMediaToCloudinary(currentGeneratedBlob, 'image', 'autoSaveStatus', 'image.jpg'); 
                    };
                } catch(e) { btn.innerHTML = `Generate Fast (Free)`; btn.disabled = false; shimmer.style.display = "none"; placeholder.style.display = "block"; }
            }
        }

        async function editImage(toolType) {
            let cost = toolType === 'upscale' ? 2 : 1;
            if (userCoinBalance < cost) return openRechargeModal();

            let targetBlob = currentGeneratedBlob;
            if (!targetBlob) return alert("Please generate or upload an image first!");

            let btn = document.getElementById(toolType + 'Btn');
            let originalHtml = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Wait...`;
            btn.disabled = true;

            try {
                let imgUrl = cloudinaryUrlOfGeneratedImage;
                if (!imgUrl) {
                    const fd = new FormData(); fd.append('file', targetBlob); fd.append('upload_preset', UPLOAD_PRESET);
                    let cloudRes = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
                    let cloudData = await cloudRes.json();
                    imgUrl = cloudData.secure_url;
                }

                let versionHash = toolType === 'upscale' 
                    ? "42fed1c4974146d4d2414e2be2c5277c7fcf05fcc3a73abf41610695738c1d7b" 
                    : "fb8af171cfa1616ddcf1242c093f9c46bcada5ad4cf6f2fbe8b81b330ec5c003"; 

                const createRes = await fetchFromMyBackend("https://api.replicate.com/v1/predictions", "POST", {
                    version: versionHash,
                    input: { image: imgUrl }
                });

                const createData = await createRes.json();
                if (!createRes.ok || createData.error) throw new Error(createData.error || "Failed");

                const checkStatus = async () => {
                    try {
                        const pollRes = await fetchFromMyBackend(createData.urls.get, "GET");
                        const pollData = await pollRes.json();

                        if (pollData.status === "succeeded") {
                            db.ref(`users/${currentUser.uid}/coins`).set(userCoinBalance - cost);
                            let fetchRes = await fetch(pollData.output);
                            currentGeneratedBlob = await fetchRes.blob();
                            cloudinaryUrlOfGeneratedImage = null; 
                            
                            document.getElementById("aiImage").src = URL.createObjectURL(currentGeneratedBlob);
                            btn.innerHTML = originalHtml; btn.disabled = false;
                        } else if (pollData.status === "failed") throw new Error("Editing failed.");
                        else setTimeout(checkStatus, 3000);
                    } catch(e) { alert(e.message); btn.innerHTML = originalHtml; btn.disabled = false; }
                };
                setTimeout(checkStatus, 3000);
            } catch (error) { alert("Error: " + error.message); btn.innerHTML = originalHtml; btn.disabled = false; }
        }

        async function generateVideo() {
            if (userCoinBalance < 5) return openRechargeModal();
            currentVideoPrompt = document.getElementById("videoPromptInput").value.trim();
            if (!currentVideoPrompt) return;
            
            let btn = document.getElementById("genVideoBtn"); 
            let videoEl = document.getElementById("aiVideo"); 
            let shimmer = document.getElementById("videoShimmer");
            let actionBtns = document.getElementById("videoActionBtns");
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Wait (1-2 min)...`; btn.disabled = true;
            actionBtns.style.display = "none"; document.getElementById("videoPlaceholderText").style.display = "none"; 
            shimmer.style.display = "block"; videoEl.style.display = "none"; videoEl.src = "";
            
            try {
                const createRes = await fetchFromMyBackend("https://api.replicate.com/v1/models/wan-video/wan-2.2-t2v-fast/predictions", "POST", { 
                    input: { prompt: currentVideoPrompt } 
                });
                const createData = await createRes.json();
                if (!createRes.ok || createData.error) throw new Error(createData.error);
                
                const checkStatus = async () => {
                    try {
                        const pollRes = await fetchFromMyBackend(createData.urls.get, "GET"); const pollData = await pollRes.json();
                        if (pollData.status === "succeeded") {
                            db.ref(`users/${currentUser.uid}/coins`).set(userCoinBalance - 5);
                            let vidFetchRes = await fetch(Array.isArray(pollData.output) ? pollData.output[0] : pollData.output);
                            currentGeneratedVideoBlob = await vidFetchRes.blob();
                            videoEl.src = URL.createObjectURL(currentGeneratedVideoBlob);
                            videoEl.style.display = "block"; shimmer.style.display = "none";
                            btn.innerHTML = `Generate Video (5 <i class="fa-solid fa-coins"></i>)`; btn.disabled = false;
                            actionBtns.style.display = "flex";
                            autoUploadMediaToCloudinary(currentGeneratedVideoBlob, 'video', 'videoAutoSaveStatus', 'video.mp4');
                        } else if (pollData.status === "failed") throw new Error("Generation failed.");
                        else setTimeout(checkStatus, 3000);
                    } catch(err) { alert(err.message); btn.innerHTML = `Generate Video`; btn.disabled = false; shimmer.style.display = "none"; }
                };
                setTimeout(checkStatus, 3000);
            } catch(e) { alert(e.message); btn.innerHTML = `Generate Video`; btn.disabled = false; shimmer.style.display = "none"; }
        }

        async function generateMusic() {
            if (userCoinBalance < 3) return openRechargeModal();
            let prompt = document.getElementById("musicPromptInput").value.trim();
            if (!prompt) return;

            let btn = document.getElementById("genMusicBtn");
            let audioEl = document.getElementById("aiMusic");
            let shimmer = document.getElementById("musicShimmer");
            let actionBtns = document.getElementById("musicActionBtns");
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Composing...`; btn.disabled = true;
            actionBtns.style.display = "none"; document.getElementById("musicPlaceholderText").style.display = "none";
            shimmer.style.display = "block"; audioEl.style.display = "none";

            try {
                const createRes = await fetchFromMyBackend("https://api.replicate.com/v1/predictions", "POST", {
                    version: "b05b1dff1d8c6dc63d14b0cdb421ce531d3bcd181eb196eb094dc30911ac681f",
                    input: { prompt: prompt, duration: 12 }
                });
                const createData = await createRes.json();
                if (!createRes.ok || createData.error) throw new Error(createData.error);

                const checkStatus = async () => {
                    try {
                        const pollRes = await fetchFromMyBackend(createData.urls.get, "GET");
                        const pollData = await pollRes.json();
                        if (pollData.status === "succeeded") {
                            db.ref(`users/${currentUser.uid}/coins`).set(userCoinBalance - 3);
                            let fetchRes = await fetch(pollData.output);
                            currentGeneratedMusicBlob = await fetchRes.blob();
                            
                            audioEl.src = URL.createObjectURL(currentGeneratedMusicBlob);
                            audioEl.style.display = "block"; shimmer.style.display = "none";
                            btn.innerHTML = `Create Music (3 <i class="fa-solid fa-coins"></i>)`; btn.disabled = false;
                            actionBtns.style.display = "flex";
                        } else if (pollData.status === "failed") throw new Error("Failed.");
                        else setTimeout(checkStatus, 3000);
                    } catch(e) { alert(e.message); btn.innerHTML = `Create Music`; btn.disabled = false; shimmer.style.display = "none"; }
                };
                setTimeout(checkStatus, 3000);
            } catch (error) { alert(error.message); btn.innerHTML = `Create Music`; btn.disabled = false; shimmer.style.display = "none"; }
        }

        async function autoUploadMediaToCloudinary(blobData, type, statusElementId, fileName) {
            let st = document.getElementById(statusElementId); st.innerText = "Saving to cloud...";
            const fd = new FormData(); fd.append('file', blobData, fileName); fd.append('upload_preset', UPLOAD_PRESET);
            try {
                const res = await fetch(type==='video'?CLOUDINARY_VIDEO_URL:CLOUDINARY_URL, { method: 'POST', body: fd });
                const data = await res.json();
                if(type === 'video') cloudinaryUrlOfGeneratedVideo = data.secure_url;
                else cloudinaryUrlOfGeneratedImage = data.secure_url;
                
                await db.ref(`users/${currentUser.uid}/gallery`).push({ 
                    url: data.secure_url, prompt: type==='video'?currentVideoPrompt:currentPrompt, type: type, timestamp: firebase.database.ServerValue.TIMESTAMP 
                });
                st.innerHTML = `<i class="fa-solid fa-check" style="color:#10b981;"></i> Saved privately.`; setTimeout(() => st.innerHTML="", 3000);
            } catch(e) { st.innerText = "Sync failed."; }
        }

        function downloadMedia(blobData, fileName) { 
            if(!blobData) return; 
            const a = document.createElement("a"); a.href = URL.createObjectURL(blobData); a.download = fileName; a.click(); 
        }

        async function publishToGlobal(cloudUrl, type) {
            if(!cloudUrl) return;
            await db.ref(`global_feed`).push({ 
                url: cloudUrl, prompt: type==='video'?currentVideoPrompt:currentPrompt, type: type,
                author: currentUser.displayName, authorPic: currentUser.photoURL, timestamp: firebase.database.ServerValue.TIMESTAMP, likes: 0 
            });
            alert("Posted to Community!"); switchTab('exploreTab', document.querySelectorAll('.nav-item')[4]);
        }

        function loadExploreFeed() {
            db.ref('global_feed').orderByChild('timestamp').limitToLast(30).on('value', snap => {
                const grid = document.getElementById('exploreGrid'); grid.innerHTML = '';
                if(snap.exists()) {
                    let items = []; snap.forEach(c => items.push({...c.val(), id: c.key}));
                    items.reverse().forEach((data) => {
                        if(!data.url) return;
                        let div = document.createElement('div'); div.className = 'gallery-item'; div.style.aspectRatio = "auto";
                        let mediaHtml = data.type==='video'||data.url.endsWith('.mp4') ? `<video src="${data.url}" autoplay loop muted playsinline style="height:350px; width:100%; object-fit:cover; border-radius:20px;"></video>` : `<img src="${data.url}" loading="lazy" style="height:350px; width:100%; object-fit:cover; border-radius:20px;">`;
                        div.innerHTML = `${mediaHtml}<div class="explore-overlay"><div class="explore-author"><img src="${data.authorPic}"><span>${data.author}</span></div><div class="explore-actions"><button class="explore-icon-btn" onclick="navigator.clipboard.writeText('${data.prompt.replace(/'/g, "\\'")}'); alert('Copied!');"><i class="fa-regular fa-copy"></i> Copy</button><button class="explore-icon-btn" onclick="db.ref('global_feed/${data.id}/likes').transaction(l=>(l||0)+1)"><i class="fa-solid fa-heart" style="color:#ef4444;"></i> ${data.likes || 0}</button></div></div>`;
                        grid.appendChild(div);
                    });
                }
            });
        }

        function loadGallery() {
            db.ref(`users/${currentUser.uid}/gallery`).on('value', snap => {
                const grid = document.getElementById('galleryGrid'); if(!grid) return; grid.innerHTML = ''; 
                if (snap.exists()) {
                    let items = []; snap.forEach(c => items.push(c.val()));
                    items.reverse().forEach((data) => {
                        if(!data.url) return;
                        let div = document.createElement('div'); div.className = 'gallery-item';
                        div.innerHTML = data.type==='video'||data.url.endsWith('.mp4') ? `<video src="${data.url}" autoplay loop muted playsinline style="width:100%; height:100%; object-fit:cover; pointer-events:none;"></video>` : `<img src="${data.url}" loading="lazy">`;
                        div.onclick = () => window.open(data.url, '_blank');
                        grid.appendChild(div);
                    });
                }
            });
        }

        async function loadChatHistory() {
            db.ref(`users/${currentUser.uid}/chats`).once('value', snap => {
                const box = document.getElementById("chatBox"); box.innerHTML = "";
                if(snap.exists()) {
                    snap.forEach(child => { 
                        let div = document.createElement("div"); div.className = `msg ${child.val().role}`; div.innerHTML = child.val().text; box.appendChild(div); 
                    });
                }
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- MEGA RAG SEARCH ENGINE (GOOGLE + AI) ---
        async function sendMessage() {
            let input = document.getElementById("chatInput"); 
            let text = input.value.trim(); 
            
            if (!text) return;
            
            if(isProMode && userCoinBalance < 1) {
                return openRechargeModal();
            }

            input.value = ""; 
            let box = document.getElementById("chatBox");
            
            let userDiv = document.createElement("div"); 
            userDiv.className = "msg user"; 
            userDiv.innerText = text; 
            box.appendChild(userDiv); 
            box.scrollTop = box.scrollHeight;
            
            db.ref(`users/${currentUser.uid}/chats`).push({ role: 'user', text: text, timestamp: firebase.database.ServerValue.TIMESTAMP });

            let typing = document.createElement("div"); 
            typing.className = "msg ai"; 
            typing.innerHTML = `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`; 
            box.appendChild(typing); 
            box.scrollTop = box.scrollHeight;

            // 1. LIVE GOOGLE SEARCH (Using Serper API)
            let searchContext = "";
            try {
                const searchRes = await fetch("https://google.serper.dev/search", {
                    method: "POST",
                    headers: {
                        "X-API-KEY": SERPER_API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ q: text })
                });
                
                const searchData = await searchRes.json();
                if (searchData.organic && searchData.organic.length > 0) {
                    searchContext = "LATEST LIVE INTERNET DATA (Use this to answer if relevant):\n";
                    for (let i = 0; i < Math.min(3, searchData.organic.length); i++) {
                        searchContext += `- ${searchData.organic[i].snippet}\n`;
                    }
                }
            } catch (e) {
                console.log("Search API error, proceeding without it.");
            }

            // 2. PREPARE THE FINAL QUESTION
            let finalPrompt = text;
            if (searchContext) {
                finalPrompt = `${searchContext}\n\nUser's Actual Question: ${text}`;
            }

            let sys = "You are Shri Mitra, a highly advanced and helpful AI created by Shriyansh. Speak clean Hinglish. Always answer naturally based on the provided live internet data if available.";
            if(document.body.classList.contains("rcb-theme")) sys += " You are a die-hard fan of RCB (Royal Challengers Bangalore).";

            if(isProMode) {
                // PRO MODE (Llama 70B + Web Search)
                try {
                    const targetApi = "https://api.replicate.com/v1/models/meta/meta-llama-3-70b-instruct/predictions";
                    const createRes = await fetchFromMyBackend(targetApi, "POST", { 
                        input: { prompt: finalPrompt, system_prompt: sys, max_tokens: 1024 } 
                    });
                    const createData = await createRes.json();
                    
                    if (!createRes.ok || createData.error) throw new Error(createData.error || "API Error");

                    const checkStatus = async () => {
                        try {
                            const pollRes = await fetchFromMyBackend(createData.urls.get, "GET");
                            const pollData = await pollRes.json();

                            if (pollData.status === "succeeded") {
                                db.ref(`users/${currentUser.uid}/coins`).set(userCoinBalance - 1);
                                let cleaned = pollData.output.join("").replace(/\n/g, '<br>');
                                
                                box.removeChild(typing);
                                let aiDiv = document.createElement("div"); aiDiv.className = "msg ai"; aiDiv.innerHTML = cleaned; 
                                box.appendChild(aiDiv); box.scrollTop = box.scrollHeight;
                                db.ref(`users/${currentUser.uid}/chats`).push({ role: 'ai', text: cleaned, timestamp: firebase.database.ServerValue.TIMESTAMP });

                                if(isGlobalVoiceOn) speakText(cleaned);

                            } else if (pollData.status === "failed") throw new Error("Failed.");
                            else setTimeout(checkStatus, 2000);
                        } catch(err) { box.removeChild(typing); alert(err.message); }
                    };
                    setTimeout(checkStatus, 2000);
                } catch (err) { box.removeChild(typing); alert("Pro Chat Error: " + err.message); }
            
            } else {
                // FAST MODE (Pollinations + Web Search fixed via POST request)
                try {
                    const response = await fetch("https://text.pollinations.ai/", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: [
                                { role: "system", content: sys },
                                { role: "user", content: finalPrompt }
                            ]
                        })
                    });
                    
                    let cleaned = (await response.text()).replace(/\n/g, '<br>');
                    
                    box.removeChild(typing);
                    let aiDiv = document.createElement("div"); aiDiv.className = "msg ai"; aiDiv.innerHTML = cleaned; 
                    box.appendChild(aiDiv); box.scrollTop = box.scrollHeight;
                    db.ref(`users/${currentUser.uid}/chats`).push({ role: 'ai', text: cleaned, timestamp: firebase.database.ServerValue.TIMESTAMP });

                    if(isGlobalVoiceOn) speakText(cleaned);

                } catch (err) { 
                    box.removeChild(typing); 
                    alert("Chat Error: " + err.message);
                }
            }
        }
    </script>

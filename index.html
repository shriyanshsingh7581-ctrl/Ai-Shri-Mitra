<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Mitra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #d946ef;
            --bg-dark: #09090b;
            --card-bg: rgba(15, 23, 42, 0.4);
            --text-main: #f8fafc;
            --text-dim: #a1a1aa;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Animated Background Orbs --- */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 10s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(99, 102, 241, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: rgba(217, 70, 239, 0.1); bottom: -10%; right: -10%; animation-delay: -5s; }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* --- Main Container --- */
        .app-container { 
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 900px;
            width: 100%;
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            z-index: 10;
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { 
            font-size: 3rem; 
            font-weight: 800; 
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #818cf8, #d946ef, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .header p { color: var(--text-dim); font-size: 1rem; font-weight: 400; }

        /* --- Tabs --- */
        .tabs { 
            display: flex; 
            background: rgba(0, 0, 0, 0.3); 
            padding: 8px; 
            border-radius: 20px; 
            margin-bottom: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .tab-btn { 
            flex: 1; 
            padding: 14px; 
            background: transparent; 
            color: var(--text-dim); 
            border: none; 
            border-radius: 14px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .tab-btn:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }
        .tab-btn.active { 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; 
            box-shadow: 0 10px 20px -5px rgba(217, 70, 239, 0.4);
        }

        .section { display: none; animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Quick Prompts --- */
        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
        }
        .prompt-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e4e4e7;
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        .prompt-chip:hover {
            background: rgba(99, 102, 241, 0.15);
            color: white;
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2);
        }

        /* --- Inputs & Buttons --- */
        .input-group, .chat-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            padding: 18px 24px;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        input[type="text"]:focus { 
            border-color: var(--primary); 
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2), inset 0 2px 4px rgba(0,0,0,0.3); 
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0 32px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px -6px rgba(217, 70, 239, 0.5);
        }
        .btn-premium:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 12px 25px -6px rgba(217, 70, 239, 0.7); 
        }
        .btn-premium:active { transform: translateY(0); }
        .btn-premium:disabled { 
            background: #3f3f46; 
            color: #a1a1aa; 
            box-shadow: none; 
            transform: none; 
            cursor: not-allowed; 
        }

        /* --- Image Output Area --- */
        .image-display-area {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px dashed rgba(255,255,255,0.2);
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .image-display-area.loaded { border-style: solid; border-color: var(--glass-border); background: #000; }
        #aiImage { width: 100%; height: auto; max-height: 600px; object-fit: contain; display: none; }
        
        /* Shimmer Loading */
        .shimmer {
            width: 100%; height: 400px;
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            display: none;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* --- Chat Interface --- */
        .chat-window {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            height: 480px;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
            scroll-behavior: smooth;
        }
        .chat-window::-webkit-scrollbar { width: 6px; }
        .chat-window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .chat-window::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .msg { 
            max-width: 82%; 
            padding: 14px 20px; 
            border-radius: 20px; 
            font-size: 15px; 
            line-height: 1.6; 
            word-wrap: break-word;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        .msg.user { 
            align-self: flex-end; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            color: white; 
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
        .msg.ai { 
            align-self: flex-start; 
            background: rgba(255, 255, 255, 0.07); 
            border: 1px solid rgba(255,255,255,0.05);
            color: #f1f5f9; 
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(10px);
        }
        .msg strong { color: #d946ef; font-weight: 700; }

        /* Typing Dots Animation */
        .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 5px 0; }
        .dot { width: 8px; height: 8px; background: #a1a1aa; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }

        .download-link {
            display: none;
            text-decoration: none;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 14px 30px;
            border-radius: 16px;
            font-weight: 600;
            text-align: center;
            width: fit-content;
            margin: 0 auto;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        .download-link:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.6); }

        /* Responsive */
        @media (max-width: 600px) {
            .app-container { padding: 25px 20px; border-radius: 20px; }
            .header h1 { font-size: 2.2rem; }
            .tabs { flex-direction: column; }
            .input-group, .chat-controls { flex-direction: column; }
            .btn-premium { padding: 16px; justify-content: center; }
            .image-display-area { min-height: 250px; }
        }
    </style>
</head>
<body>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="app-container">
        <div class="header">
            <h1>Shri Mitra</h1>
            <p>Next-Gen Creative AI Assistant</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('imageTab', this)">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Image Studio
            </button>
            <button class="tab-btn" onclick="switchTab('chatTab', this)">
                <i class="fa-solid fa-comment-dots"></i> AI Chat Assistant
            </button>
        </div>

        <div id="imageTab" class="section active">
            
            <div class="quick-prompts">
                <button class="prompt-chip" onclick="useMagicPrompt('A highly detailed 8k portrait of a beautiful Indian bride with traditional jewelry, soft studio lighting')">
                    <i class="fa-solid fa-camera-retro"></i> Bridal Portrait
                </button>
                <button class="prompt-chip" onclick="useMagicPrompt('A majestic Indian wedding mandap decorated with red roses and marigolds, glowing lights, cinematic')">
                    <i class="fa-solid fa-fan"></i> Wedding Mandap
                </button>
                <button class="prompt-chip" onclick="useMagicPrompt('A magical pre-wedding photoshoot background in a misty forest, glowing fairy lights, romantic vibe')">
                    <i class="fa-solid fa-heart"></i> Pre-Wedding Vibe
                </button>
                <button class="prompt-chip" onclick="useMagicPrompt('A futuristic neon cyberpunk cityscape, glowing lights, hyperrealistic, 8k resolution')">
                    <i class="fa-solid fa-city"></i> Cyberpunk Vibe
                </button>
            </div>

            <div class="input-group">
                <input type="text" id="promptInput" placeholder="Describe your imagination in detail..." onkeypress="if(event.key === 'Enter') generateImage()">
                <button id="genBtn" class="btn-premium" onclick="generateImage()">
                    Generate <i class="fa-solid fa-sparkles"></i>
                </button>
            </div>

            <div class="image-display-area" id="imageDisplay">
                <div class="shimmer" id="shimmer"></div>
                <div id="placeholderText" style="color: rgba(255,255,255,0.3); text-align: center;">
                    <i class="fa-regular fa-image" style="font-size: 3.5rem; display: block; margin-bottom: 15px; opacity: 0.5;"></i>
                    Your masterpiece will appear here
                </div>
                <img id="aiImage" alt="Generated Artwork">
            </div>

            <center>
                <a id="downloadBtn" class="download-link" onclick="downloadImage()">
                    <i class="fa-solid fa-download"></i> Save High-Res
                </a>
            </center>
        </div>

        <div id="chatTab" class="section">
            <div class="chat-window" id="chatBox">
                <div class="msg ai">
                    <strong>Shri Mitra:</strong><br><br>
                    Namaste! 🙏 Main aapka smart AI dost hoon. Aaj main aapki kaise madad kar sakta hoon?
                </div>
            </div>
            <div class="chat-controls">
                <input type="text" id="chatInput" placeholder="Ask me anything (Hinglish supported)..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="btn-premium" id="sendBtn" onclick="sendMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "sk_cbty293zoEEDKLJXsMAaq4A2psY1yq1a"; 

        function switchTab(tabId, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // --- Magic Prompt Logic ---
        function useMagicPrompt(text) {
            document.getElementById("promptInput").value = text;
            generateImage();
        }

        // --- Image Logic ---
        function generateImage() {
            let prompt = document.getElementById("promptInput").value;
            let btn = document.getElementById("genBtn");
            let img = document.getElementById("aiImage");
            let shimmer = document.getElementById("shimmer");
            let placeholder = document.getElementById("placeholderText");
            let downloadBtn = document.getElementById("downloadBtn");
            let displayArea = document.getElementById("imageDisplay");

            if (!prompt) return;

            // UI Reset
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Processing...`;
            img.style.display = "none";
            placeholder.style.display = "none";
            shimmer.style.display = "block";
            downloadBtn.style.display = "none";
            displayArea.classList.remove("loaded");

            const seed = Math.floor(Math.random() * 999999);
            const url = `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?key=${apiKey}&model=flux&seed=${seed}&nologo=true`;

            img.src = url;

            img.onload = () => {
                shimmer.style.display = "none";
                img.style.display = "block";
                displayArea.classList.add("loaded");
                btn.disabled = false;
                btn.innerHTML = `Generate <i class="fa-solid fa-sparkles"></i>`;
                downloadBtn.style.display = "inline-flex";
            };
            
            img.onerror = () => {
                shimmer.style.display = "none";
                placeholder.style.display = "block";
                placeholder.innerHTML = `<i class="fa-solid fa-circle-exclamation" style="font-size: 3rem; color: #f43f5e; margin-bottom: 10px;"></i><br>Error aa gaya! Please try again.`;
                btn.disabled = false;
                btn.innerHTML = `Generate <i class="fa-solid fa-sparkles"></i>`;
            }
        }

        async function downloadImage() {
            let img = document.getElementById("aiImage");
            let dBtn = document.getElementById("downloadBtn");
            if (!img.src) return;
            
            dBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Downloading...";
            try {
                const response = await fetch(img.src);
                const blob = await response.blob();
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `ShriMitra_AI_${Date.now()}.jpg`;
                link.click();
                dBtn.innerHTML = "<i class='fa-solid fa-check'></i> Saved!";
                setTimeout(() => { dBtn.innerHTML = "<i class='fa-solid fa-download'></i> Save High-Res"; }, 2000);
            } catch (e) {
                alert("Mobile par image ko long-press karke save karein.");
                dBtn.innerHTML = "<i class='fa-solid fa-download'></i> Save High-Res";
            }
        }

        // --- Chat Logic ---
        async function sendMessage() {
            let input = document.getElementById("chatInput");
            let chatBox = document.getElementById("chatBox");
            let sendBtn = document.getElementById("sendBtn");
            let text = input.value.trim();

            if (!text) return;

            // User Message
            appendMessage('user', text);
            input.value = "";
            sendBtn.disabled = true;

            // AI Loading Message (New Bouncing Dots)
            let aiMsgDiv = appendMessage('ai', `<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const systemPrompt = "You are Shri Mitra, an advanced AI Assistant created by Shriyansh. You are helpful, kind, and you always talk in a mix of Hindi and English (Hinglish). Keep answers concise and professional.";
                const url = `https://gen.pollinations.ai/text/${encodeURIComponent(text)}?system=${encodeURIComponent(systemPrompt)}&key=${apiKey}`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error("Server Request Failed");
                
                const data = await response.text();
                
                // Typing effect remove karke data dalna
                aiMsgDiv.innerHTML = `<strong>Shri Mitra:</strong><br><br>${data.replace(/\n/g, '<br>')}`;
                
            } catch (err) {
                console.error(err);
                aiMsgDiv.innerHTML = `<strong>Shri Mitra:</strong><br><br><span style="color: #f43f5e;"><i class="fa-solid fa-triangle-exclamation"></i> Network Error! Chat server se connect nahi ho pa raha.</span>`;
            }
            
            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(role, text) {
            let chatBox = document.getElementById("chatBox");
            let div = document.createElement("div");
            div.className = `msg ${role}`;
            div.innerHTML = text; // role === 'user' ? text : `<strong>Shri Mitra:</strong><br>${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
